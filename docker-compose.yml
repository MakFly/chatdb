services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatdb
      POSTGRES_PASSWORD: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://chatdb:chatdb@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production}
      BETTER_AUTH_URL: http://api:3001
      PORT: "3001"
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
